# Phase 5 — CODASC validation case.
#
# Reproduces the CODASC reference configuration: isolated street canyon,
# aspect ratio H/W = 1, EMPTY (no trees), perpendicular wind, continuous
# street-level line source. Run at the production resolution (48 cells/H) in the
# validated steady-laminar regime (Re=25, BGK). The 2-D model represents the
# 3-D wind tunnel's mid-length (y/L = 0) centre plane.
#
# Honest scope: the wind tunnel is turbulent (Re ~ 3.7e4); this laminar model
# will NOT match the absolute c+ quantitatively. Phase 5 therefore validates the
# PATTERN -- the leeward/windward asymmetry and the vertical c+ decay -- which is
# governed by the canyon vortex and is the physically robust comparison.

type: canyon
seed: 12345

resolution:
  cells_per_H: 48                 # production resolution (Phase 4 gate)

geometry:
  aspect_ratio: 1.0               # CODASC reference: H/W = 1
  building_width_H: 1.0
  fetch_upstream_H: 4.0
  top_margin_H: 5.0
  outflow_H: 8.0

flow:
  Re: 25.0                        # steady laminar (Phase 4 production regime)
  u_lbm: 0.05
  collision: bgk
  inlet_profile: log
  z0_over_H: 0.01
  sponge_H: 4.0
  tau_sponge: 1.0

scalar:
  enabled: true
  schmidt: 0.72
  source_strength: 1.0            # arbitrary; c+ normalizes it out

run:
  max_iter: 144000                # ~10 flow-throughs at n=48
  steady_tol: 1.0e-6
  check_every: 4000
  ramp_iters: 8000
  average_from: 86400             # time-average the (steady) field over the last ~4 flow-throughs

# CODASC reference data (downloaded from umweltaerodynamik.de / codasc.de):
validation:
  reference_A: data/validation/codasc_AR1_notrees_90deg_A.txt   # wall A (leeward)
  reference_B: data/validation/codasc_AR1_notrees_90deg_B.txt   # wall B (windward)
  wall_offset_xplus: 0.04167      # c+ sampled at x/H = 1/24 in front of each wall
